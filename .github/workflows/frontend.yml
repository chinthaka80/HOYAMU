name: Next.js Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install Dependencies
      run: |
        cd frontend
        npm ci

    - name: TypeScript Check
      run: |
        cd frontend
        npx tsc --noEmit

    - name: Run ESLint
      run: |
        cd frontend
        npm run lint

    - name: Next.js Build
      run: |
        cd frontend
        npm run build
